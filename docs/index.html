<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoConvert AI - Full Stack Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; }
        .font-display { font-family: 'Orbitron', sans-serif; }
        .neon-text { 
            background: linear-gradient(90deg, #00d4ff, #bc13fe, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .cyber-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .cyber-button {
            background: linear-gradient(90deg, #00d4ff, #bc13fe);
            transition: all 0.3s;
        }
        .cyber-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,212,255,0.3);
        }
        .gradient-bg {
            background: 
                radial-gradient(circle at 20% 50%, rgba(123,44,191,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0,212,255,0.1) 0%, transparent 50%);
        }
    </style>
</head>
<body class="text-white min-h-screen gradient-bg">
    
    <!-- Header -->
    <header class="py-8 px-4 text-center border-b border-white/10">
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-cyan-500/30 mb-4">
            <span class="text-cyan-400 text-sm">v2.0 Full Stack</span>
        </div>
        <h1 class="font-display text-5xl font-bold mb-2 neon-text">NeoConvert AI</h1>
        <p class="text-gray-400 text-lg">9 Revolutionary Features for 2035+ Economies</p>
        <p class="text-sm text-gray-500 mt-2">Built for Bengaluru Ideathons | React + Node.js + TensorFlow</p>
    </header>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-black/50 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex flex-wrap gap-2 justify-center" id="navButtons">
                <!-- Nav buttons will be inserted here -->
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-8" id="mainContent">
        <!-- Content will be inserted here -->
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/10 py-6 mt-12 text-center text-gray-500">
        <p class="font-display text-lg">NeoConvert AI</p>
        <p class="text-sm">Full-Stack Implementation Complete</p>
    </footer>

    <script>
        // ====== DATA ======
        const locations = [
            { id: 'bengaluru', name: 'Bengaluru', wage: 85, category: 'IT Hub' },
            { id: 'mumbai', name: 'Mumbai', wage: 75, category: 'Financial' },
            { id: 'delhi', name: 'Delhi', wage: 70, category: 'Capital' },
            { id: 'chennai', name: 'Chennai', wage: 65, category: 'Manufacturing' },
            { id: 'hyderabad', name: 'Hyderabad', wage: 68, category: 'Tech' },
            { id: 'rural_bihar', name: 'Rural Bihar', wage: 25, category: 'Agricultural' },
        ];

        const spaceLocations = [
            { id: 'earth', name: '🌍 Earth', rate: 1, resource: 'USD' },
            { id: 'mars', name: '🔴 Mars', rate: 2.5, resource: 'O2 Units' },
            { id: 'moon', name: '🌙 Moon', rate: 1.8, resource: 'He-3' },
            { id: 'titan', name: '🪐 Titan', rate: 4.0, resource: 'Hydrocarbon' },
        ];

        const countries = [
            { id: 'usa', name: '🇺🇸 USA', rent: 1500, food: 400, transport: 100, utilities: 150, taxRate: 0.24 },
            { id: 'uk', name: '🇬🇧 UK', rent: 1200, food: 350, transport: 90, utilities: 120, taxRate: 0.20 },
            { id: 'germany', name: '🇩🇪 Germany', rent: 900, food: 300, transport: 80, utilities: 100, taxRate: 0.26 },
            { id: 'japan', name: '🇯🇵 Japan', rent: 800, food: 350, transport: 100, utilities: 110, taxRate: 0.23 },
            { id: 'india_bengaluru', name: '🇮🇳 Bengaluru', rent: 300, food: 150, transport: 30, utilities: 40, taxRate: 0.30 },
        ];

        const currencies = [
            { id: 'INR', name: 'Indian Rupee', scores: { stability: 85, inclusivity: 70, sustainability: 60, transparency: 75, fairness: 65 } },
            { id: 'USD', name: 'US Dollar', scores: { stability: 90, inclusivity: 65, sustainability: 55, transparency: 80, fairness: 60 } },
            { id: 'EUR', name: 'Euro', scores: { stability: 88, inclusivity: 80, sustainability: 75, transparency: 85, fairness: 78 } },
        ];

        let currentMode = 'converter';
        let chatHistory = [];

        // ====== NAVIGATION ======
        const modes = [
            { id: 'converter', label: '⚡ Convert', color: 'from-cyan-500 to-blue-500' },
            { id: 'twin', label: '🧠 AI Twin', color: 'from-purple-500 to-pink-500' },
            { id: 'universal', label: '🌍 Value Index', color: 'from-green-500 to-emerald-500' },
            { id: 'space', label: '🚀 Space', color: 'from-red-500 to-orange-500' },
            { id: 'reality', label: '🧭 Reality', color: 'from-orange-500 to-yellow-500' },
            { id: 'agent', label: '🤖 Agent', color: 'from-purple-600 to-indigo-500' },
            { id: 'bio', label: '💓 Bio', color: 'from-rose-500 to-pink-500' },
            { id: 'quantum', label: '⚛️ Quantum', color: 'from-violet-500 to-purple-500' },
            { id: 'ethical', label: '⚖️ Ethical', color: 'from-emerald-500 to-teal-500' },
        ];

        function renderNav() {
            const nav = document.getElementById('navButtons');
            nav.innerHTML = modes.map(mode => `
                <button onclick="setMode('${mode.id}')" 
                    class="px-4 py-2 rounded-lg font-medium transition-all ${
                        currentMode === mode.id 
                            ? `bg-gradient-to-r ${mode.color} text-white shadow-lg` 
                            : 'bg-white/5 text-gray-400 hover:bg-white/10 hover:text-white'
                    }">
                    ${mode.label}
                </button>
            `).join('');
        }

        function setMode(mode) {
            currentMode = mode;
            renderNav();
            renderContent();
        }

        // ====== CONTENT RENDERERS ======
        function renderContent() {
            const main = document.getElementById('mainContent');
            const renderers = {
                converter: renderConverter,
                twin: renderTwin,
                universal: renderUniversal,
                space: renderSpace,
                reality: renderReality,
                agent: renderAgent,
                bio: renderBio,
                quantum: renderQuantum,
                ethical: renderEthical,
            };
            main.innerHTML = renderers[currentMode]();
        }

        function renderConverter() {
            return `
                <div class="cyber-card rounded-xl p-6">
                    <h2 class="text-2xl font-bold mb-4 font-display neon-text">Quantum Converter</h2>
                    <div class="grid md:grid-cols-3 gap-4 mb-6">
                        <input type="number" id="convAmount" value="1000" placeholder="Amount" 
                            class="px-4 py-3 bg-black/30 border border-white/10 rounded-lg text-white text-xl">
                        <select id="convFrom" class="px-4 py-3 bg-black/30 border border-white/10 rounded-lg text-white">
                            <option value="INR">INR (₹)</option>
                            <option value="USD">USD ($)</option>
                            <option value="EUR">EUR (€)</option>
                        </select>
                        <select id="convTo" class="px-4 py-3 bg-black/30 border border-white/10 rounded-lg text-white">
                            <option value="USD">USD ($)</option>
                            <option value="INR">INR (₹)</option>
                            <option value="EUR">EUR (€)</option>
                        </select>
                    </div>
                    <button onclick="executeConvert()" class="cyber-button w-full py-3 rounded-lg font-bold">
                        ✨ Execute Conversion
                    </button>
                    <div id="convResult" class="mt-4"></div>
                </div>
            `;
        }

        function renderTwin() {
            return `
                <div class="cyber-card rounded-xl p-6">
                    <h2 class="text-2xl font-bold mb-4 font-display neon-text">AI Financial Twin</h2>
                    <p class="text-gray-400 mb-4">Chat with your digital financial clone</p>
                    
                    <div class="bg-black/30 rounded-lg p-4 h-64 overflow-y-auto mb-4" id="chatHistory">
                        ${chatHistory.length === 0 ? '<p class="text-gray-500 text-center mt-20">Ask your twin anything...</p>' : ''}
                        ${chatHistory.map(msg => `
                            <div class="mb-3 ${msg.role === 'user' ? 'text-right' : 'text-left'}">
                                <span class="inline-block px-3 py-2 rounded-lg ${
                                    msg.role === 'user' 
                                        ? 'bg-purple-500/30 border border-purple-500/50' 
                                        : 'bg-cyan-500/30 border border-cyan-500/50'
                                }">
                                    ${msg.content}
                                </span>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="flex gap-2">
                        <input type="text" id="twinInput" placeholder="Ask your twin..." 
                            class="flex-1 px-4 py-3 bg-black/30 border border-white/10 rounded-lg text-white"
                            onkeypress="if(event.key==='Enter')askTwin()">
                        <button onclick="askTwin()" class="cyber-button px-6 py-3 rounded-lg">Send</button>
                    </div>
                </div>
            `;
        }

        function renderUniversal() {
            return `
                <div class="cyber-card rounded-xl p-6">
                    <h2 class="text-2xl font-bold mb-4 font-display neon-text">Universal Value Index</h2>
                    <p class="text-gray-400 mb-4">See your money in hours of work required</p>
                    
                    <div class="flex gap-4 mb-6">
                        <input type="number" id="uniAmount" value="1000" 
                            class="flex-1 px-4 py-3 bg-black/30 border border-white/10 rounded-lg text-white text-xl">
                        <button onclick="calculateUniversal()" class="cyber-button px-6 py-3 rounded-lg">Calculate</button>
                    </div>
                    
                    <div id="uniResult"></div>
                </div>
            `;
        }

        function renderSpace() {
            return `
                <div class="cyber-card rounded-xl p-6">
                    <h2 class="text-2xl font-bold mb-4 font-display neon-text">Space Economy Converter</h2>
                    <p class="text-gray-400 mb-4">Convert to Mars, Moon, Titan credits</p>
                    
                    <div class="grid md:grid-cols-3 gap-4 mb-6">
                        <input type="number" id="spaceAmount" value="1000" 
                            class="px-4 py-3 bg-black/30 border border-white/10 rounded-lg text-white">
                        <select id="spaceFrom" class="px-4 py-3 bg-black/30 border border-white/10 rounded-lg text-white">
                            ${spaceLocations.map(l => `<option value="${l.id}">${l.name}</option>`).join('')}
                        </select>
                        <select id="spaceTo" class="px-4 py-3 bg-black/30 border border-white/10 rounded-lg text-white">
                            ${spaceLocations.map(l => `<option value="${l.id}" ${l.id === 'mars' ? 'selected' : ''}>${l.name}</option>`).join('')}
                        </select>
                    </div>
                    
                    <button onclick="convertSpace()" class="cyber-button w-full py-3 rounded-lg font-bold">
                        🚀 Launch Conversion
                    </button>
                    <div id="spaceResult" class="mt-4"></div>
                </div>
            `;
        }

        function renderReality() {
            return `
                <div class="cyber-card rounded-xl p-6">
                    <h2 class="text-2xl font-bold mb-4 font-display neon-text">Reality Simulation</h2>
                    <p class="text-gray-400 mb-4">Experience living abroad on your salary</p>
                    
                    <div class="flex gap-4 mb-6">
                        <input type="number" id="realAmount" value="50000" placeholder="Monthly Income (₹)"
                            class="flex-1 px-4 py-3 bg-black/30 border border-white/10 rounded-lg text-white">
                        <select id="realCountry" class="px-4 py-3 bg-black/30 border border-white/10 rounded-lg text-white">
                            ${countries.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
                        </select>
                    </div>
                    
                    <button onclick="simulateReality()" class="cyber-button w-full py-3 rounded-lg font-bold">
                        🌐 Simulate Lifestyle
                    </button>
                    <div id="realResult" class="mt-4"></div>
                </div>
            `;
        }

        function renderAgent() {
            return `
                <div class="cyber-card rounded-xl p-6">
                    <h2 class="text-2xl font-bold mb-4 font-display neon-text">Autonomous Agent</h2>
                    
                    <div class="grid grid-cols-3 gap-4 mb-6">
                        <div class="p-4 bg-purple-500/20 rounded-lg text-center border border-purple-500/30">
                            <p class="text-3xl font-bold text-purple-400">85%</p>
                            <p class="text-xs text-gray-400">Trust Score</p>
                        </div>
                        <div class="p-4 bg-cyan-500/20 rounded-lg text-center border border-cyan-500/30">
                            <p class="text-3xl font-bold text-cyan-400">78%</p>
                            <p class="text-xs text-gray-400">AI Learning</p>
                        </div>
                        <div class="p-4 bg-green-500/20 rounded-lg text-center border border-green-500/30">
                            <p class="text-3xl font-bold text-green-400">Auto</p>
                            <p class="text-xs text-gray-400">Mode</p>
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        ${[
                            { cond: 'EUR rises 2%', action: 'Auto-convert', active: true },
                            { cond: 'Amount > ₹1L', action: 'Require approval', active: true },
                            { cond: 'High volatility', action: 'Block', active: false },
                        ].map(r => `
                            <div class="flex justify-between items-center p-3 rounded-lg ${r.active ? 'bg-green-500/10 border border-green-500/30' : 'bg-white/5'}">
                                <div>
                                    <p class="font-medium">IF ${r.cond}</p>
                                    <p class="text-sm text-gray-400">THEN ${r.action}</p>
                                </div>
                                <span class="px-3 py-1 rounded ${r.active ? 'bg-green-500 text-white' : 'bg-gray-600'}">${r.active ? 'Active' : 'Off'}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderBio() {
            return `
                <div class="cyber-card rounded-xl p-6">
                    <h2 class="text-2xl font-bold mb-4 font-display neon-text">Bio-Adaptive System</h2>
                    <p class="text-gray-400 mb-4">Stress sensing for safe trading</p>
                    
                    <div class="space-y-4 mb-6">
                        <div>
                            <label class="flex justify-between text-sm mb-2"><span>❤️ Heart Rate</span><span>75 BPM</span></label>
                            <input type="range" min="50" max="120" value="75" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                        </div>
                        <div>
                            <label class="flex justify-between text-sm mb-2"><span>😰 Stress Level</span><span>30%</span></label>
                            <input type="range" min="0" max="100" value="30" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                        </div>
                        <div>
                            <label class="flex justify-between text-sm mb-2"><span>😴 Sleep Quality</span><span>7 hrs</span></label>
                            <input type="range" min="3" max="10" value="7" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                        </div>
                    </div>
                    
                    <div class="p-4 bg-green-500/20 rounded-lg border border-green-500/30">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <span class="text-2xl">🛡️</span>
                                <span class="font-bold text-green-400">OPTIMAL STATE</span>
                            </div>
                            <div class="text-right">
                                <p class="text-2xl font-bold">35%</p>
                                <p class="text-xs text-gray-400">Risk Score</p>
                            </div>
                        </div>
                        <p class="text-sm mt-2">Maximum Transaction: <span class="text-cyan-400 font-bold">₹100,000</span></p>
                    </div>
                </div>
            `;
        }

        function renderQuantum() {
            return `
                <div class="cyber-card rounded-xl p-6">
                    <h2 class="text-2xl font-bold mb-4 font-display neon-text">Quantum Prediction</h2>
                    <p class="text-gray-400 mb-4">See 1000 parallel futures</p>
                    
                    <div class="grid md:grid-cols-3 gap-4 mb-6">
                        <input type="number" value="10000" class="px-4 py-3 bg-black/30 border border-white/10 rounded-lg text-white">
                        <select class="px-4 py-3 bg-black/30 border border-white/10 rounded-lg text-white">
                            <option>INR</option><option>USD</option>
                        </select>
                        <select class="px-4 py-3 bg-black/30 border border-white/10 rounded-lg text-white">
                            <option>USD</option><option>INR</option>
                        </select>
                    </div>
                    
                    <button onclick="showQuantumResults()" class="cyber-button w-full py-3 rounded-lg font-bold">
                        ⚛️ Calculate Superposition
                    </button>
                    
                    <div id="quantumResults" class="mt-4 space-y-3">
                        <div class="p-4 bg-green-500/10 rounded-lg border border-green-500/30">
                            <p class="text-green-400 font-bold">Best Case (25%)</p>
                            <p class="text-2xl font-bold">$126.50</p>
                        </div>
                        <div class="p-4 bg-cyan-500/10 rounded-lg border border-cyan-500/30">
                            <p class="text-cyan-400 font-bold">Expected (50%)</p>
                            <p class="text-2xl font-bold">$120.00</p>
                        </div>
                        <div class="p-4 bg-red-500/10 rounded-lg border border-red-500/30">
                            <p class="text-red-400 font-bold">Worst Case (25%)</p>
                            <p class="text-2xl font-bold">$114.00</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderEthical() {
            const curr = currencies[0];
            const overall = Math.round((curr.scores.stability + curr.scores.inclusivity + curr.scores.sustainability + curr.scores.transparency + curr.scores.fairness) / 5);
            return `
                <div class="cyber-card rounded-xl p-6">
                    <h2 class="text-2xl font-bold mb-4 font-display neon-text">Ethical Analysis</h2>
                    
                    <select class="w-full px-4 py-3 bg-black/30 border border-white/10 rounded-lg text-white mb-6">
                        ${currencies.map(c => `<option value="${c.id}">${c.name} (${c.id})</option>`).join('')}
                    </select>
                    
                    <div class="text-center mb-6">
                        <div class="inline-flex items-center gap-4 p-4 bg-gradient-to-r from-emerald-500/20 to-teal-500/20 rounded-xl border border-emerald-500/30">
                            <span class="text-4xl">🏆</span>
                            <div>
                                <p class="text-4xl font-bold text-emerald-400">B</p>
                                <p class="text-xs text-gray-400">Overall Grade</p>
                            </div>
                            <div class="border-l border-white/20 pl-4">
                                <p class="text-2xl font-bold">${overall}/100</p>
                                <p class="text-xs text-gray-400">ESG Score</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-5 gap-3">
                        ${Object.entries(curr.scores).map(([key, score]) => `
                            <div class="p-3 bg-white/5 rounded-lg text-center border border-white/10">
                                <p class="text-xs text-gray-400 capitalize">${key}</p>
                                <p class="text-lg font-bold text-cyan-400">${score}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // ====== ACTIONS ======
        function executeConvert() {
            const amount = document.getElementById('convAmount').value;
            const from = document.getElementById('convFrom').value;
            const to = document.getElementById('convTo').value;
            
            const rates = { INR: { USD: 0.012, EUR: 0.011 }, USD: { INR: 83.12, EUR: 0.92 }, EUR: { INR: 90.35, USD: 1.09 } };
            const rate = rates[from][to];
            const result = (amount * rate).toFixed(2);
            
            document.getElementById('convResult').innerHTML = `
                <div class="p-4 bg-gradient-to-r from-purple-500/20 to-cyan-500/20 rounded-lg border border-white/10">
                    <div class="grid md:grid-cols-2 gap-4">
                        <div><p class="text-gray-400">Original</p><p class="text-xl font-bold">₹${amount}</p></div>
                        <div><p class="text-gray-400">Converted</p><p class="text-xl font-bold text-cyan-400">${to === 'USD' ? '$' : '€'}${result}</p></div>
                    </div>
                </div>
            `;
        }

        function askTwin() {
            const input = document.getElementById('twinInput');
            const msg = input.value;
            if (!msg) return;
            
            chatHistory.push({ role: 'user', content: msg });
            
            const responses = [
                "As your financial twin, I analyze your moderate risk profile. I recommend waiting for a 2% better rate. Confidence: 85%",
                "Based on your ₹50k income pattern, this conversion fits your goals. Proceed with caution. Trust score: 78%",
                "I've learned from your past 50 decisions. Current market timing is optimal. Execute now!"
            ];
            
            chatHistory.push({ role: 'twin', content: responses[Math.floor(Math.random() * responses.length)] });
            input.value = '';
            renderContent();
        }

        function calculateUniversal() {
            const amount = document.getElementById('uniAmount').value;
            const hours = amount / 85;
            
            document.getElementById('uniResult').innerHTML = `
                <div class="p-4 bg-gradient-to-r from-green-500/20 to-cyan-500/20 rounded-lg border border-green-500/30 mb-4">
                    <p class="text-lg">₹${amount} requires <span class="text-2xl font-bold text-cyan-400">${hours.toFixed(1)} hours</span> in Bengaluru</p>
                    <p class="text-sm text-gray-400">But only ${(amount / 1500).toFixed(1)} hours in USA</p>
                </div>
                <div class="grid md:grid-cols-2 gap-4">
                    <div class="p-3 bg-black/30 rounded-lg">
                        <p class="text-cyan-400 font-semibold mb-2">India Comparison</p>
                        ${locations.map(l => `
                            <div class="flex justify-between py-1"><span>${l.name}</span><span class="font-bold">${(amount / l.wage).toFixed(1)} hrs</span></div>
                        `).join('')}
                    </div>
                    <div class="p-3 bg-black/30 rounded-lg">
                        <p class="text-purple-400 font-semibold mb-2">Global Comparison</p>
                        <div class="flex justify-between py-1"><span>USA</span><span class="font-bold">${(amount / 1500).toFixed(1)} hrs</span></div>
                        <div class="flex justify-between py-1"><span>UK</span><span class="font-bold">${(amount / 1200).toFixed(1)} hrs</span></div>
                        <div class="flex justify-between py-1"><span>Germany</span><span class="font-bold">${(amount / 1100).toFixed(1)} hrs</span></div>
                    </div>
                </div>
            `;
        }

        function convertSpace() {
            const amount = document.getElementById('spaceAmount').value;
            const fromId = document.getElementById('spaceFrom').value;
            const toId = document.getElementById('spaceTo').value;
            
            const fromLoc = spaceLocations.find(l => l.id === fromId);
            const toLoc = spaceLocations.find(l => l.id === toId);
            
            const result = (amount * fromLoc.rate / toLoc.rate).toFixed(2);
            
            document.getElementById('spaceResult').innerHTML = `
                <div class="p-4 bg-gradient-to-r from-purple-500/20 to-blue-500/20 rounded-lg border border-purple-500/30 text-center">
                    <p class="text-gray-400 mb-2">Conversion Result</p>
                    <p class="text-4xl font-bold bg-gradient-to-r from-purple-400 to-cyan-400 bg-clip-text text-transparent">
                        ${result} ${toLoc.resource}
                    </p>
                    <p class="text-sm text-gray-500 mt-2">From ${fromLoc.name} to ${toLoc.name}</p>
                </div>
            `;
        }

        function simulateReality() {
            const amount = document.getElementById('realAmount').value;
            const countryId = document.getElementById('realCountry').value;
            const country = countries.find(c => c.id === countryId);
            
            const monthly = country.rent + country.food + country.transport + country.utilities;
            const tax = amount * country.taxRate;
            const afterTax = amount - tax;
            const months = Math.floor(afterTax / monthly);
            
            document.getElementById('realResult').innerHTML = `
                <div class="p-4 bg-gradient-to-r from-orange-500/20 to-red-500/20 rounded-lg border border-orange-500/30">
                    <div class="text-center mb-4">
                        <p class="text-gray-400">Sustainable for</p>
                        <p class="text-4xl font-bold text-orange-400">${months} months</p>
                        <p class="text-sm text-gray-500">in ${country.name}</p>
                    </div>
                    <div class="grid grid-cols-4 gap-2 text-center text-sm">
                        <div class="p-2 bg-black/30 rounded"><p class="text-gray-400">Rent</p><p class="font-bold">$${country.rent}</p></div>
                        <div class="p-2 bg-black/30 rounded"><p class="text-gray-400">Food</p><p class="font-bold">$${country.food}</p></div>
                        <div class="p-2 bg-black/30 rounded"><p class="text-gray-400">Transport</p><p class="font-bold">$${country.transport}</p></div>
                        <div class="p-2 bg-black/30 rounded"><p class="text-gray-400">Utilities</p><p class="font-bold">$${country.utilities}</p></div>
                    </div>
                </div>
            `;
        }

        // ====== INIT ======
        renderNav();
        renderContent();
    </script>
</body>
</html>
